services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_BCRYPT: ${ADMIN_PASSWORD_BCRYPT:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?ADMIN_SESSION_SECRET is required}
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:?ADMIN_API_SECRET is required}
      AI_PROVIDER_TEST_TIMEOUT_SECONDS: ${AI_PROVIDER_TEST_TIMEOUT_SECONDS:-20}
      AI_PROVIDER_GENERATION_TIMEOUT_SECONDS: ${AI_PROVIDER_GENERATION_TIMEOUT_SECONDS:-45}
      AI_QUEST_CRON_ENABLED: ${AI_QUEST_CRON_ENABLED:-true}
      AI_QUEST_CRON_TIMEOUT_SECONDS: ${AI_QUEST_CRON_TIMEOUT_SECONDS:-900}
      AI_QUEST_PROVIDER_CALL_TIMEOUT_SECONDS: ${AI_QUEST_PROVIDER_CALL_TIMEOUT_SECONDS:-60}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Paris}
      OPEN_AI_KEY: ${OPEN_AI_KEY:-}
      OPEN_AI_MODEL: ${OPEN_AI_MODEL:-gpt-4o-mini}
      MISTRAL_AI_KEY: ${MISTRAL_AI_KEY:-}
      MISTRAL_AI_MODEL: ${MISTRAL_AI_MODEL:-mistral-large-latest}
      ANTHROPIC_AI_KEY: ${ANTHROPIC_AI_KEY:-}
      ANTHROPIC_AI_MODEL: ${ANTHROPIC_AI_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-8192}
      GEMINI_AI_KEY: ${GEMINI_AI_KEY:-}
      GEMINI_AI_MODEL: ${GEMINI_AI_MODEL:-gemini-3.5-flash}
      AI_QUEST_PROVIDER_ROTATION: ${AI_QUEST_PROVIDER_ROTATION:-mistral,openai}
      AI_PRICE_DEFAULT_INPUT_USD_PER_1M: ${AI_PRICE_DEFAULT_INPUT_USD_PER_1M:-0}
      AI_PRICE_DEFAULT_OUTPUT_USD_PER_1M: ${AI_PRICE_DEFAULT_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_OPENAI_INPUT_USD_PER_1M: ${AI_PRICE_OPENAI_INPUT_USD_PER_1M:-0}
      AI_PRICE_OPENAI_OUTPUT_USD_PER_1M: ${AI_PRICE_OPENAI_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_MISTRAL_INPUT_USD_PER_1M: ${AI_PRICE_MISTRAL_INPUT_USD_PER_1M:-0}
      AI_PRICE_MISTRAL_OUTPUT_USD_PER_1M: ${AI_PRICE_MISTRAL_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_OPENROUTER_INPUT_USD_PER_1M: ${AI_PRICE_OPENROUTER_INPUT_USD_PER_1M:-0}
      AI_PRICE_OPENROUTER_OUTPUT_USD_PER_1M: ${AI_PRICE_OPENROUTER_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_XIA_INPUT_USD_PER_1M: ${AI_PRICE_XIA_INPUT_USD_PER_1M:-0}
      AI_PRICE_XIA_OUTPUT_USD_PER_1M: ${AI_PRICE_XIA_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_CLAUDE_INPUT_USD_PER_1M: ${AI_PRICE_CLAUDE_INPUT_USD_PER_1M:-0}
      AI_PRICE_CLAUDE_OUTPUT_USD_PER_1M: ${AI_PRICE_CLAUDE_OUTPUT_USD_PER_1M:-0}
      AI_PRICE_GEMINI_INPUT_USD_PER_1M: ${AI_PRICE_GEMINI_INPUT_USD_PER_1M:-0}
      AI_PRICE_GEMINI_OUTPUT_USD_PER_1M: ${AI_PRICE_GEMINI_OUTPUT_USD_PER_1M:-0}
      APP_MAX_CONCURRENT_REQUESTS: ${APP_MAX_CONCURRENT_REQUESTS:-8}
      APP_QUEUE_TIMEOUT_SECONDS: ${APP_QUEUE_TIMEOUT_SECONDS:-10}
      APP_MAX_BODY_BYTES: ${APP_MAX_BODY_BYTES:-1048576}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-battleia}
      DB_USER: ${DB_USER:-battleia}
      DB_PASSWORD: ${DB_PASSWORD:-battleia}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES:-30}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Persistent assets for Nexus (avatars, etc.) - configure in Dokploy Persistent Storage if not using compose
      # Base dir for all Nexus assets (avatars, factions, ia-companions images)
      # Mount a Persistent Storage in Dokploy to this exact container path to survive rebuilds.
      NEXUS_ASSETS_BASE_DIR: /nexus_game/assets
      NEXUS_ASSETS_BASE_URL: /nexus_game/assets
      # Build hero / RP character images share the same persistent Nexus asset volume.
      # Public URLs stay /assets/heroes/... for Flutter compatibility.
      HERO_IMAGE_PUBLIC_DIR: /nexus_game/assets/heroes
      HERO_IMAGE_PUBLIC_BASE_URL: /assets/heroes
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Persistent volume for all Nexus Game assets (avatars, factions, IA companions images, etc.)
      # Declared in the top-level `volumes:` section below so Compose creates `nexus-assets` (or `cgwm-battleia-k0ryy3_nexus-assets` in Dokploy).
      # Mounted on the **app** service (not mariadb!).
      # Images written under /nexus_game/assets/* (subdirs avatar/faction/companion/heroes) will survive every rebuild/recreate.
      - nexus-assets:/nexus_game/assets
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${DB_NAME:-battleia}
      MARIADB_USER: ${DB_USER:-battleia}
      MARIADB_PASSWORD: ${DB_PASSWORD:-battleia}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mariadb-data:
  redis-data:
  nexus-assets:
